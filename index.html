<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Adventure</title>

    <style>
        /* =========================================
           1. RESET & BASE
           ========================================= */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0d0d0d;
            /* Fonte moderna e limpa para um visual minimalista */
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            user-select: none;
        }

        * { box-sizing: border-box; }

        canvas {
            display: block;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Camada que segura toda a Interface */
        #ui-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* Telas de Fundo (Blur suave atrás dos painéis) */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px); /* Efeito vidro fosco */
            -webkit-backdrop-filter: blur(6px);
        }

        .screen.active { display: flex; }

        /* =========================================
           2. PAINÉIS MINIMALISTAS (Menu, Pause, Vitória)
           ========================================= */
        .panel, .ui-panel {
            background: rgba(20, 20, 22, 0.75); /* Fundo quase preto transparente */
            border: 1px solid rgba(255, 255, 255, 0.1); /* Borda muito fina e subtil */
            border-radius: 12px; /* Cantos suavemente arredondados */
            padding: 32px 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .menu-panel, .pause-panel {
            width: min(420px, 90vw);
        }

        /* Títulos limpos e elegantes */
        h1, .ui-title {
            font-size: 2.5rem;
            color: #f1c40f;
            margin: 0 0 8px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .game-subtitle {
            font-size: 1rem;
            color: #aaa;
            margin: 0 0 24px 0;
            font-weight: 400;
        }

        h2 {
            font-size: 1.5rem;
            color: #fff;
            margin: 0 0 16px 0;
            font-weight: 600;
        }

        p, .ui-text {
            font-size: 1rem;
            color: #ddd;
            margin: 0 0 12px 0;
        }

        .ui-subtext {
            font-size: 0.85rem;
            color: #777;
            margin-top: 20px;
        }

        /* Cores de Destaque */
        .ui-highlight { color: #f1c40f; font-weight: bold; }
        .ui-highlight-danger { color: #e74c3c; font-weight: bold; }
        .ui-highlight-info { color: #3498db; font-weight: bold; }
        .success-text { color: #2ecc71; }
        .danger-text { color: #e74c3c; }

        .rank-display {
            font-size: 5rem;
            font-weight: 900;
            color: #2ecc71;
            margin: 10px 0;
            text-shadow: 0 0 30px rgba(46, 204, 113, 0.3);
        }

        /* =========================================
           3. BOTÕES FLAT E MODERNOS
           ========================================= */
        button {
            width: 100%;
            display: block;
            margin: 10px 0;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        /* Cores nos Hover dos botões */
        .btn.primary:hover { background: #2ecc71; color: #000; border-color: #2ecc71; }
        .btn.danger:hover { background: #e74c3c; color: #000; border-color: #e74c3c; }

        /* =========================================
           4. TOGGLES (Interruptores Minimalistas)
           ========================================= */
        #menu-options, .pause-options {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            text-align: left;
        }

        #menu-options.hidden { display: none; }

        .toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-size: 0.95rem;
            color: #ccc;
            cursor: pointer;
        }

        /* Estilo iOS toggle */
        .toggle input {
            appearance: none;
            width: 40px;
            height: 22px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 11px;
            position: relative;
            outline: none;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .toggle input::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            transition: 0.3s ease;
        }

        .toggle input:checked { background: #2ecc71; }
        .toggle input:checked::after { transform: translateX(18px); }

        /* =========================================
           5. HUD DE JOGO (Vida, Mana e Controlos)
           ========================================= */
        #hud {
            display: none;
            position: absolute;
            inset: 0; /* Preenche a tela toda sem bloquear cliques */
            pointer-events: none;
        }

        #hud.active { display: block; }

        /* Container de Stats (Topo Esquerda) */
        #hud-stats-container {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .bars-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Fundo das barras */
        .bar-bg {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            overflow: hidden;
            width: 200px;
        }
        
        .bar-bg:nth-child(2) { width: 160px; } /* Barra de mana menor */

        .bar-fill {
            height: 100%;
            transition: width 0.2s ease-out, background-color 0.2s;
        }

        .health-fill { height: 16px; }
        .mana-fill { height: 8px; background-color: #3498db; }

        .wave-info-text {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .buff-alert { color: #f1c40f; }

        /* Painel de Controlos (Topo Direita) */
        .right-panel {
            position: absolute;
            top: 24px;
            right: 24px;
            padding: 16px 20px;
            text-align: left;
        }

        .control-line {
            margin: 6px 0;
            font-size: 0.9rem;
            color: #bbb;
        }

        .key-highlight {
            color: #fff;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            display: inline-block;
            min-width: 24px;
            text-align: center;
        }

        .mana-cost { color: #555; font-size: 0.8rem; }

        /* Fase Atual (Fundo Esquerda) */
        #hud-phase {
            position: absolute;
            bottom: 24px;
            left: 24px;
            font-size: 1.2rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        /* Overlay Central de Transição */
        .center-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-color: rgba(241, 196, 15, 0.3);
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-layer">

        <div id="menu-screen" class="screen active">
            <div class="panel menu-panel">
                <h1>Forest Adventure</h1>
                <p class="game-subtitle">Derrote as ondas, destrua os portais e salve a floresta.</p>

                <button id="btn-start" class="btn primary">Iniciar Jogo</button>
                <button id="btn-options" class="btn secondary">Configurações</button>
                <button id="btn-exit" class="btn danger">Sair do Jogo</button>

                <div id="menu-options" class="hidden">
                    <label class="toggle">
                        <span>Música de Fundo</span>
                        <input type="checkbox" id="opt-music" checked>
                    </label>
                    <label class="toggle">
                        <span>Efeitos Sonoros</span>
                        <input type="checkbox" id="opt-sfx" checked>
                    </label>
                </div>
            </div>
        </div>

        <div id="paused-screen" class="screen">
            <div class="panel pause-panel">
                <h2>Jogo Pausado</h2>

                <div class="pause-options">
                    <label class="toggle">
                        <span>Música de Fundo</span>
                        <input type="checkbox" id="pause-music-toggle" checked>
                    </label>
                    <label class="toggle">
                        <span>Efeitos Sonoros</span>
                        <input type="checkbox" id="pause-sfx-toggle" checked>
                    </label>
                </div>

                <div style="margin-top: 24px;">
                    <button id="btn-resume" class="btn primary">Retomar Partida</button>
                    <button id="btn-pause-menu" class="btn secondary">Voltar ao Menu</button>
                    <button id="btn-pause-exit" class="btn danger">Sair do Jogo</button>
                </div>

                <p class="ui-subtext">Pressione [ESC] para voltar à ação</p>
            </div>
        </div>

        <div id="phase-screen" class="screen">
            <div class="panel">
                <h2 class="success-text">Fase Concluída!</h2>
                <p class="ui-subtext">Pressione [ENTER] para a próxima fase</p>
            </div>
        </div>

        <div id="gameover-screen" class="screen">
            <div class="panel">
                <h2 class="danger-text">GAME OVER</h2>
                <p>A floresta foi dominada...</p>
                <p class="ui-subtext">Pressione [ENTER] para tentar novamente</p>
            </div>
        </div>

        <div id="win-screen" class="screen">
            </div>

        <div id="hud">
            <div id="hud-health"></div>
            <div id="hud-phase"></div>
        </div>

    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
